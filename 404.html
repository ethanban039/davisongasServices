<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found — Davison Gas Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-primary: #1B2A4A;
            --clr-accent: #E86A2A;
            --clr-accent-hover: #D45A1A;
            --clr-bg: #F7F8FA;
            --clr-white: #FFFFFF;
            --clr-muted: #5A6275;
            --font-heading: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--clr-bg);
            color: var(--clr-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .error-page {
            max-width: 520px;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(5rem, 15vw, 9rem);
            font-weight: 800;
            color: var(--clr-accent);
            line-height: 1;
            margin-bottom: 16px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            color: var(--clr-muted);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 700;
            padding: 16px 32px;
            background: var(--clr-accent);
            color: var(--clr-white);
            border: none;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--clr-accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(232,106,42,0.3);
        }

        .links {
            margin-top: 24px;
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: var(--clr-muted);
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: var(--clr-accent);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1>This page doesn't exist</h1>
        <p>Looks like you've followed a broken link or typed something wrong. No worries — let's get you back on track.</p>
        <a href="/" class="btn">Back to Homepage</a>
        <div class="links">
            <a href="/#services">Our Services</a>
            <a href="/#contact">Get In Touch</a>
            <a href="tel:07875272021">Call 07875 272021</a>
        </div>
    </div>
</body>
</html>
